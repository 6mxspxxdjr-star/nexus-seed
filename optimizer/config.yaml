# Nexus Autoresearch Configuration
# Defines the optimization search space and schedule

autoresearch:
  version: "1.0"
  train_script: "${NEXUS_HOME}/optimizer/train.py"
  log_file: "${NEXUS_HOME}/optimizer/optimization_log.jsonl"

  # Optimization target
  objective: "maximize"  # maximize the metric from train.py
  metric_name: "composite_score"

  # Search space — autoresearch modifies PARAMS in train.py within these bounds
  search_space:
    # === Simulation parameters ===
    num_agents:
      type: "int"
      min: 50
      max: 500
      step: 50

    num_rounds:
      type: "int"
      min: 10
      max: 200
      step: 10

    lookback_min:
      type: "int"
      min: 1
      max: 10

    lookback_max:
      type: "int"
      min: 10
      max: 50

    threshold_min:
      type: "float"
      min: 0.001
      max: 0.05
      step: 0.005

    threshold_max:
      type: "float"
      min: 0.02
      max: 0.15
      step: 0.01

    momentum_weight:
      type: "float"
      min: 0.0
      max: 1.0
      step: 0.1

    mean_reversion_weight:
      type: "float"
      min: 0.0
      max: 1.0
      step: 0.1

    position_sizing:
      type: "categorical"
      values: ["equal", "kelly", "risk_parity"]

    # === Model routing parameters ===
    routing_confidence_threshold:
      type: "float"
      min: 0.3
      max: 0.9
      step: 0.1
      description: "Minimum classification confidence before falling back to heuristic"

    routing_cloud_escalation_threshold:
      type: "categorical"
      values: ["medium", "high", "critical"]
      description: "Minimum complexity to escalate to cloud models"

    # === Memory system parameters ===
    memory_decay_lambda:
      type: "float"
      min: 0.01
      max: 0.15
      step: 0.01
      description: "Time decay rate for memory activation (higher = faster decay)"

    memory_search_top_k:
      type: "int"
      min: 3
      max: 20
      description: "Number of memories to retrieve for RAG"

    memory_rrf_k:
      type: "int"
      min: 20
      max: 100
      step: 10
      description: "RRF fusion constant (higher = more conservative fusion)"

    # === RL judge parameters ===
    rl_reward_threshold:
      type: "float"
      min: 0.3
      max: 0.8
      step: 0.1
      description: "Minimum reward to consider an action successful"

    rl_signal_window_days:
      type: "int"
      min: 1
      max: 14
      description: "Days of RL signals to include in optimization"

  # Schedule
  schedule:
    mode: "overnight"  # Run optimizations between midnight and 6am
    start_hour: 0
    end_hour: 6
    max_iterations: 50
    timeout_minutes: 300  # 5 hours max

  # Early stopping
  early_stopping:
    patience: 10  # Stop if no improvement after 10 iterations
    min_improvement: 0.001
